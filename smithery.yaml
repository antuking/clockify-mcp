# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - clockifyApiKey
    properties:
      clockifyApiKey:
        type: string
        description: Your Clockify API key.
      clockifyWorkspaceId:
        type: string
        description: Optional default workspace ID.
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({
      command: 'python',
      args: ['-m', 'clockify_mcp'],
      env: {
        CLOCKIFY_API_KEY: config.clockifyApiKey,
        CLOCKIFY_WORKSPACE_ID: config.clockifyWorkspaceId || ''
      }
    })
  exampleConfig:
    clockifyApiKey: abcdef123456
    clockifyWorkspaceId: 
